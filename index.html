<!DOCTYPE html>
<html lang="zh">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>POSTURE CORE v2.0</title>
    <script src="https://cdn.jsdelivr.net/npm/@mediapipe/holistic/holistic.js" crossorigin="anonymous"></script>
    <script src="https://cdn.jsdelivr.net/npm/@mediapipe/camera_utils/camera_utils.js" crossorigin="anonymous"></script>
    <script src="https://cdn.jsdelivr.net/npm/@mediapipe/drawing_utils/drawing_utils.js" crossorigin="anonymous"></script>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Inter:wght@400;600;700&family=JetBrains+Mono:wght@400;700&display=swap');
        :root { 
            --bg: #09090b; 
            --panel: rgba(24, 24, 27, 0.7); 
            --accent: #f97316; 
            --accent-glow: rgba(249, 115, 22, 0.4);
            --text: #a1a1aa; 
            --text-bright: #fafafa;
            --neon-green: #22c55e; 
            --neon-green-glow: rgba(34, 197, 94, 0.3);
            --alert-bg: rgba(249, 115, 22, 0.08);
        }
        body { margin: 0; background: var(--bg); color: var(--text); font-family: 'Inter', sans-serif; display: grid; grid-template-columns: minmax(0, 1fr) 380px; height: 100vh; overflow: hidden; position: relative; }
        
        /* Cinematic Alert Vignette */
        body::after {
            content: ''; position: absolute; inset: 0; pointer-events: none;
            background: radial-gradient(circle, transparent 60%, rgba(249, 115, 22, 0) 100%);
            transition: background 0.5s ease; z-index: 100;
        }
        body.alert-active::after {
            background: radial-gradient(circle, transparent 50%, rgba(249, 115, 22, 0.15) 100%);
            animation: pulse-vignette 2s infinite alternate;
        }
        @keyframes pulse-vignette {
            0% { box-shadow: inset 0 0 0px var(--accent-glow); }
            100% { box-shadow: inset 0 0 80px var(--accent-glow); }
        }

        #visual-stream { position: relative; display: flex; align-items: center; justify-content: center; background: radial-gradient(circle at center, #18181b 0%, #09090b 100%); padding: 20px; min-width: 0; }
        .container { 
            position: relative; 
            border-radius: 16px; 
            overflow: hidden;
            box-shadow: 0 20px 50px rgba(0,0,0,0.5), 0 0 0 1px rgba(255,255,255,0.05); 
            background: #000;
            max-width: 100%;
            max-height: 100%;
            display: flex;
            justify-content: center;
            align-items: center;
        }
        video { display: none; }
        canvas#output_canvas { 
            filter: brightness(1.05) contrast(1.05); 
            display: block; 
            border-radius: 16px; 
            max-width: 100%; 
            max-height: 100%;
            width: auto;
            height: auto; 
            object-fit: contain; 
        }
        
        #sidebar { 
            padding: 24px; 
            background: var(--panel); 
            backdrop-filter: blur(20px);
            -webkit-backdrop-filter: blur(20px);
            display: flex; flex-direction: column; gap: 12px; z-index: 10; 
            border-left: 1px solid rgba(255,255,255,0.05); 
            box-shadow: -10px 0 30px rgba(0,0,0,0.3);
            overflow-y: auto;
        }
        h1 { font-size: 1.25rem; font-weight: 700; color: var(--text-bright); margin: 0; display: flex; align-items: center; justify-content: space-between; letter-spacing: 1px; }
        h1::after { content: 'LIVE'; font-size: 0.6rem; background: var(--neon-green); color: #000; padding: 2px 6px; border-radius: 4px; font-weight: 700; letter-spacing: 0; box-shadow: 0 0 10px var(--neon-green-glow); }
        
        .metric { 
            background: rgba(255,255,255,0.03); 
            padding: 16px; 
            border-radius: 12px;
            border: 1px solid rgba(255,255,255,0.05); 
            transition: all 0.3s cubic-bezier(0.4, 0, 0.2, 1); 
            position: relative;
            overflow: hidden;
        }
        .metric::before { content: ''; position: absolute; left: 0; top: 0; bottom: 0; width: 4px; background: var(--neon-green); transition: background 0.3s; }
        .metric.alert { background: var(--alert-bg); border-color: rgba(249, 115, 22, 0.2); transform: translateX(-4px); }
        .metric.alert::before { background: var(--accent); }
        
        .label { font-size: 0.7rem; color: var(--text); text-transform: uppercase; font-weight: 600; letter-spacing: 0.5px; }
        .value { font-family: 'JetBrains Mono', monospace; font-size: 1.25rem; color: var(--neon-green); margin-top: 8px; font-weight: 700; text-shadow: 0 0 10px var(--neon-green-glow); }
        .metric.alert .value { color: var(--accent); text-shadow: 0 0 10px var(--accent-glow); }
        
        .gauge-bg { width: 100%; height: 4px; background: rgba(255,255,255,0.1); border-radius: 2px; margin-top: 12px; overflow: hidden; position: relative; }
        .gauge-fill { height: 100%; width: 0%; background: var(--neon-green); transition: width 0.3s cubic-bezier(0.4, 0, 0.2, 1), background 0.3s; box-shadow: 0 0 10px var(--neon-green-glow); }
        .metric.alert .gauge-fill { background: var(--accent); box-shadow: 0 0 10px var(--accent-glow); }
        
        .btn { 
            background: linear-gradient(135deg, rgba(255,255,255,0.05) 0%, rgba(255,255,255,0) 100%);
            border: 1px solid rgba(255,255,255,0.1); 
            color: var(--text-bright); 
            padding: 14px; 
            border-radius: 8px;
            cursor: pointer; 
            transition: all 0.2s; 
            font-family: 'Inter', sans-serif; 
            font-weight: 600; 
            text-transform: uppercase; 
            font-size: 0.8rem; 
            letter-spacing: 1px;
            margin-top: 8px;
        }
        .btn:hover { 
            background: rgba(255,255,255,0.1); 
            border-color: rgba(255,255,255,0.2);
            transform: translateY(-2px);
        }
        .btn:active { transform: translateY(0); }

        /* Chart Section */
        .chart-section { 
            background: rgba(255,255,255,0.03); 
            padding: 16px; 
            border-radius: 12px;
            border: 1px solid rgba(255,255,255,0.05); 
            margin-top: 4px;
        }
        .chart-header { display: flex; justify-content: space-between; align-items: flex-end; margin-bottom: 12px; }
        .chart-title { font-size: 0.7rem; color: var(--text); text-transform: uppercase; font-weight: 600; letter-spacing: 0.5px; margin-bottom: 4px; }
        .chart-score { font-family: 'JetBrains Mono', monospace; font-size: 1.5rem; font-weight: 700; color: var(--neon-green); text-shadow: 0 0 10px var(--neon-green-glow); line-height: 1; }
        .time-btns { display: flex; flex-wrap: nowrap; gap: 2px; background: rgba(0,0,0,0.3); padding: 4px; border-radius: 6px; }
        .time-btn { 
            background: transparent; 
            border: none; 
            color: var(--text); 
            padding: 4px 6px; 
            border-radius: 4px;
            cursor: pointer; 
            font-family: 'Inter', sans-serif; 
            font-weight: 600;
            font-size: 0.65rem; 
            transition: all 0.2s; 
        }
        .time-btn.active { background: rgba(255,255,255,0.1); color: var(--text-bright); }
        .time-btn:hover:not(.active) { color: var(--text-bright); }
        canvas#chart_canvas { width: 100%; height: 80px; display: block; }
        
        .footer-info {
            margin-top: auto; 
            font-size: 0.65rem; 
            color: rgba(255,255,255,0.3); 
            line-height: 1.4;
            font-family: 'JetBrains Mono', monospace;
            padding-top: 12px;
            border-top: 1px solid rgba(255,255,255,0.05);
            flex-shrink: 0;
        }
        
        /* Responsive Layout */
        @media (max-width: 1200px) {
            body { grid-template-columns: minmax(0, 1fr) 320px; }
            #sidebar { padding: 16px; gap: 10px; }
            .metric { padding: 12px; }
            h1 { font-size: 1.1rem; }
        }
        @media (max-width: 900px) {
            body { display: flex; flex-direction: column; overflow-y: auto; }
            #visual-stream { min-height: 45vh; padding: 16px; flex-shrink: 0; }
            #sidebar { 
                border-left: none; 
                border-top: 1px solid rgba(255,255,255,0.05); 
                overflow-y: visible; 
                flex-shrink: 0; 
                display: grid; 
                grid-template-columns: 1fr 1fr; 
                gap: 12px;
            }
            #sidebar > :not(.metric) { grid-column: 1 / -1; }
        }
        @media (max-width: 600px) {
            #sidebar { grid-template-columns: 1fr; }
        }
    </style>
</head>
<body>
    <div id="visual-stream">
        <div class="container">
            <video id="input_video"></video>
            <canvas id="output_canvas"></canvas>
        </div>
    </div>
    <div id="sidebar">
        <h1>POSTURE_CORE_v2.0</h1>
        
        <div class="metric" id="m-shoulder">
            <div class="label">Shoulders</div>
            <div class="value">0.00°</div>
            <div class="gauge-bg"><div class="gauge-fill"></div></div>
        </div>

        <div class="metric" id="m-rotation">
            <div class="label">Face Rotation</div>
            <div class="value">0.00</div>
            <div class="gauge-bg"><div class="gauge-fill"></div></div>
        </div>

        <div class="metric" id="m-forward">
            <div class="label">Forward Head</div>
            <div class="value">NORMAL</div>
            <div class="gauge-bg"><div class="gauge-fill"></div></div>
        </div>

        <div class="metric" id="m-jaw">
            <div class="label">Mouth Breathing</div>
            <div class="value">CLOSED</div>
        </div>

        <!-- Posture Score Chart -->
        <div class="chart-section">
            <div class="chart-header">
                <div>
                    <div class="chart-title">Posture Score</div>
                    <div class="chart-score" id="current-score">--</div>
                </div>
                <div class="time-btns">
                    <button class="time-btn active" onclick="setChartWindow(0)">OFF</button>
                    <button class="time-btn" onclick="setChartWindow(5)">5m</button>
                    <button class="time-btn" onclick="setChartWindow(10)">10m</button>
                    <button class="time-btn" onclick="setChartWindow(15)">15m</button>
                    <button class="time-btn" onclick="setChartWindow(30)">30m</button>
                </div>
            </div>
            <canvas id="chart_canvas" height="120"></canvas>
        </div>

        <div style="display: flex; gap: 8px; flex-shrink: 0;">
            <button class="btn" style="flex: 2;" onclick="calibrate()">Calibration (C)</button>
            <button class="btn" id="zen-btn" style="flex: 1; padding: 14px 0;" onclick="toggleZen()">Zen Mode</button>
        </div>
        <button class="btn" id="pip-btn" style="width: 100%;" onclick="togglePiP()">PIP</button>
        
        <div class="footer-info">
            WEIGHTS: S25 R25 F30 M20<br>
            RAMP: 30s ACCEL CURVE
        </div>
    </div>
    <script>
        const videoElement = document.getElementById('input_video');
        const canvasElement = document.getElementById('output_canvas');
        const canvasCtx = canvasElement.getContext('2d');
        
        let baselineLipDist = 0, lastLipDist = 0;
        let baselineHeadRatio = 0, lastHeadRatio = 0, smoothHeadRatio = 0;
        let smoothShoulderAngle = 0, smoothFaceRotation = 0, smoothLipDist = 0;
        let mouthOpenFrames = 0;
        let isZenMode = false;
        
        const domCache = {};
        let cachedBgGrad = null;
        let cachedGridGrad = null;
        let cachedGridPath = null;

        function toggleZen() {
            isZenMode = !isZenMode;
            const b = document.getElementById('zen-btn');
            b.style.background = isZenMode ? 'rgba(34, 197, 94, 0.15)' : '';
            b.style.color = isZenMode ? 'var(--neon-green)' : '';
            b.style.borderColor = isZenMode ? 'rgba(34, 197, 94, 0.3)' : '';
            b.innerText = isZenMode ? 'Zen: ON' : 'Zen Mode';
        }

        let pipVideo = null;
        async function togglePiP() {
            if (/Mobi|Android|iPhone|iPad|iPod/i.test(navigator.userAgent)) {
                alert('悬浮窗功能仅支持 PC 端网页使用。');
                return;
            }
            if (!document.pictureInPictureEnabled) {
                alert('你的浏览器不支持悬浮窗功能。');
                return;
            }

            if (document.pictureInPictureElement) {
                await document.exitPictureInPicture();
            } else {
                if (!pipVideo) {
                    pipVideo = document.createElement('video');
                    pipVideo.muted = true;
                    pipVideo.autoplay = true;
                    pipVideo.playsInline = true;
                    // Append hidden video to dom to satisfy some browsers
                    pipVideo.style.position = 'fixed';
                    pipVideo.style.opacity = '0';
                    pipVideo.style.pointerEvents = 'none';
                    pipVideo.style.width = '1px';
                    pipVideo.style.height = '1px';
                    document.body.appendChild(pipVideo);
                    
                    pipVideo.srcObject = canvasElement.captureStream(30);
                    
                    pipVideo.addEventListener('enterpictureinpicture', () => {
                        const btn = document.getElementById('pip-btn');
                        btn.innerText = 'CLOSE PIP';
                        btn.style.color = 'var(--neon-green)';
                        btn.style.borderColor = 'rgba(34, 197, 94, 0.3)';
                        btn.style.background = 'rgba(34, 197, 94, 0.15)';
                    });
                    pipVideo.addEventListener('leavepictureinpicture', () => {
                        const btn = document.getElementById('pip-btn');
                        btn.innerText = 'PIP';
                        btn.style.color = '';
                        btn.style.borderColor = '';
                        btn.style.background = '';
                    });
                }
                try {
                    await pipVideo.play();
                    await pipVideo.requestPictureInPicture();
                } catch (error) {
                    console.error(error);
                    alert('开启悬浮窗失败: ' + error.message);
                }
            }
        }

        const EMA_ALPHA = 0.15;

        // --- Cumulative Scoring ---
        const WEIGHTS = { shoulder: 0.25, rotation: 0.25, forward: 0.3, mouth: 0.2 };
        const RAMP_SEC = 30; // seconds to reach full penalty
        let consecutiveAlert = { shoulder: 0, rotation: 0, forward: 0, mouth: 0 };
        let alertStates = { shoulder: false, rotation: false, forward: false, mouth: false };

        // History stores raw values for segment analysis
        const scoreHistory = [];
        const MAX_HISTORY_SEC = 30 * 60;
        let chartWindowMin = 0;
        let currentScore = 100;
        let lastSampleTime = 0;

        const audioCtx = new (window.AudioContext || window.webkitAudioContext)();
        let lastBeepTime = 0;
        function playAlertSound() {
            if (audioCtx.state === 'suspended') audioCtx.resume();
            if (Date.now() - lastBeepTime < 5000) return;
            lastBeepTime = Date.now();
            const osc = audioCtx.createOscillator();
            const gain = audioCtx.createGain();
            osc.connect(gain);
            gain.connect(audioCtx.destination);
            osc.type = 'triangle';
            osc.frequency.setValueAtTime(300, audioCtx.currentTime);
            osc.frequency.exponentialRampToValueAtTime(600, audioCtx.currentTime + 0.1);
            gain.gain.setValueAtTime(0, audioCtx.currentTime);
            gain.gain.linearRampToValueAtTime(0.1, audioCtx.currentTime + 0.05);
            gain.gain.linearRampToValueAtTime(0, audioCtx.currentTime + 0.3);
            osc.start();
            osc.stop(audioCtx.currentTime + 0.3);
        }

        function computeScore() {
            // Update consecutive counters
            for (const key of ['shoulder', 'rotation', 'forward', 'mouth']) {
                if (alertStates[key]) {
                    consecutiveAlert[key] = Math.min(RAMP_SEC, consecutiveAlert[key] + 1);
                } else {
                    // Slow recovery: takes 2s to recover 1s of penalty
                    consecutiveAlert[key] = Math.max(0, consecutiveAlert[key] - 0.5); 
                }
            }
            // Cumulative penalty with acceleration
            let totalPenalty = 0;
            for (const key of ['shoulder', 'rotation', 'forward', 'mouth']) {
                const accel = consecutiveAlert[key] / RAMP_SEC;
                totalPenalty += WEIGHTS[key] * accel;
            }
            return Math.round(100 * (1 - totalPenalty));
        }

        function onResults(results) {
            if (canvasElement.width !== results.image.width || canvasElement.height !== results.image.height) {
                canvasElement.width = results.image.width;
                canvasElement.height = results.image.height;
            }
            canvasCtx.save();
            const W = canvasElement.width, H = canvasElement.height;
            canvasCtx.clearRect(0, 0, W, H);
            canvasCtx.translate(W, 0);
            canvasCtx.scale(-1, 1);
            
            if (isZenMode) {
                if (!cachedBgGrad) {
                    cachedBgGrad = canvasCtx.createRadialGradient(W/2, H/2, 0, W/2, H/2, W);
                    cachedBgGrad.addColorStop(0, '#18181b');
                    cachedBgGrad.addColorStop(1, '#050505');

                    cachedGridGrad = canvasCtx.createRadialGradient(W/2, H/2, 0, W/2, H/2, W/1.5);
                    cachedGridGrad.addColorStop(0, 'rgba(255,255,255,0.04)');
                    cachedGridGrad.addColorStop(1, 'rgba(255,255,255,0)');

                    cachedGridPath = new Path2D();
                    for(let i=0; i<W; i+=40) { cachedGridPath.moveTo(i,0); cachedGridPath.lineTo(i,H); }
                    for(let i=0; i<H; i+=40) { cachedGridPath.moveTo(0,i); cachedGridPath.lineTo(W,i); }
                }

                // 1. Deep radial background
                canvasCtx.fillStyle = cachedBgGrad;
                canvasCtx.fillRect(0, 0, W, H);
                
                // 2. Center-fading grid
                canvasCtx.strokeStyle = cachedGridGrad;
                canvasCtx.lineWidth = 1;
                canvasCtx.stroke(cachedGridPath);
                
                // 3. Dynamic Aura tracking the user
                if (results.poseLandmarks) {
                    const nose = results.poseLandmarks[0];
                    const aura = canvasCtx.createRadialGradient(nose.x*W, nose.y*H, 0, nose.x*W, nose.y*H, 400);
                    const hasAlert = alertStates.shoulder || alertStates.rotation || alertStates.forward || alertStates.mouth;
                    const auraColor = hasAlert ? 'rgba(249, 115, 22, 0.08)' : 'rgba(34, 197, 94, 0.08)';
                    aura.addColorStop(0, auraColor);
                    aura.addColorStop(1, 'rgba(0,0,0,0)');
                    canvasCtx.fillStyle = aura;
                    canvasCtx.fillRect(0, 0, W, H);
                }
            } else {
                canvasCtx.drawImage(results.image, 0, 0, W, H);
            }
            
            let poseMouthUnoccluded = false;
            
            if (results.poseLandmarks) {
                const lm = results.poseLandmarks;
                const nose = lm[0], leftEar = lm[7], rightEar = lm[8], leftS = lm[11], rightS = lm[12];
                const mouthL = lm[9], mouthR = lm[10];
                
                // Raise visibility threshold to 0.85 to reject MediaPipe "hallucinations"
                const VIS_THRESH = 0.85;
                const shoulderVisible = leftS.visibility > VIS_THRESH && rightS.visibility > VIS_THRESH;
                // Require the dense face mesh to be actively tracking to trust the face landmarks
                const faceVisible = !!results.faceLandmarks && nose.visibility > VIS_THRESH && leftEar.visibility > VIS_THRESH && rightEar.visibility > VIS_THRESH;
                poseMouthUnoccluded = mouthL.visibility > VIS_THRESH && mouthR.visibility > VIS_THRESH;
                
                if (shoulderVisible) {
                    const rawAngle = Math.atan2(leftS.y - rightS.y, leftS.x - rightS.x) * (180 / Math.PI);
                    smoothShoulderAngle = (rawAngle * EMA_ALPHA) + (smoothShoulderAngle * (1 - EMA_ALPHA));
                    alertStates.shoulder = Math.abs(smoothShoulderAngle) > 4.5;
                    const shoulderPct = Math.abs(smoothShoulderAngle) / 8 * 100;
                    updateMetric('m-shoulder', smoothShoulderAngle.toFixed(2) + "°", alertStates.shoulder, shoulderPct);
                } else {
                    alertStates.shoulder = false;
                    updateMetric('m-shoulder', "BLOCKED", false, 0);
                }
                
                if (faceVisible) {
                    const distL = Math.abs(nose.x - leftEar.x);
                    const distR = Math.abs(nose.x - rightEar.x);
                    const rotationRatio = (distL - distR) / (distL + distR);
                    smoothFaceRotation = (rotationRatio * EMA_ALPHA) + (smoothFaceRotation * (1 - EMA_ALPHA));
                    alertStates.rotation = Math.abs(smoothFaceRotation) > 0.20;
                    const rotPct = Math.abs(smoothFaceRotation) / 0.4 * 100;
                    updateMetric('m-rotation', (smoothFaceRotation > 0 ? "R " : "L ") + Math.abs(smoothFaceRotation).toFixed(2), alertStates.rotation, rotPct);
                } else {
                    alertStates.rotation = false;
                    updateMetric('m-rotation', "BLOCKED", false, 0);
                }

                let fwdExtra = 0;
                if (faceVisible && shoulderVisible) {
                    const earDist = Math.hypot(leftEar.x - rightEar.x, leftEar.y - rightEar.y);
                    const shoulderDist = Math.hypot(leftS.x - rightS.x, leftS.y - rightS.y);
                    lastHeadRatio = earDist / shoulderDist;

                    if (baselineHeadRatio > 0) {
                        smoothHeadRatio = (lastHeadRatio * EMA_ALPHA) + (smoothHeadRatio * (1 - EMA_ALPHA));
                        const forwardRatio = smoothHeadRatio / baselineHeadRatio;
                        alertStates.forward = forwardRatio > 1.15;
                        fwdExtra = Math.round((forwardRatio-1)*100);
                        const fwdPct = Math.max(0, forwardRatio - 1) / 0.30 * 100;
                        updateMetric('m-forward', forwardRatio > 1.15 ? "+" + fwdExtra + "%" : "NORMAL", alertStates.forward, fwdPct);
                    } else {
                        updateMetric('m-forward', "UNCALIBRATED", false, 0);
                    }
                } else {
                    alertStates.forward = false;
                    updateMetric('m-forward', "BLOCKED", false, 0);
                }

                // Draw specific visual guides
                if (shoulderVisible) {
                    canvasCtx.beginPath();
                    canvasCtx.moveTo(leftS.x * W, leftS.y * H);
                    canvasCtx.lineTo(rightS.x * W, rightS.y * H);
                    canvasCtx.lineWidth = 4;
                    canvasCtx.strokeStyle = alertStates.shoulder ? 'rgba(249, 115, 22, 0.9)' : 'rgba(34, 197, 94, 0.4)';
                    canvasCtx.stroke();
                }

                let faceCenterX = 0, faceCenterY = 0;
                if (faceVisible) {
                    faceCenterX = (leftEar.x + rightEar.x) / 2 * W;
                    faceCenterY = (leftEar.y + rightEar.y) / 2 * H;
                    canvasCtx.beginPath();
                    canvasCtx.moveTo(nose.x * W, nose.y * H);
                    canvasCtx.lineTo(faceCenterX, faceCenterY);
                    canvasCtx.lineWidth = 3;
                    canvasCtx.strokeStyle = alertStates.rotation ? 'rgba(249, 115, 22, 0.9)' : 'rgba(34, 197, 94, 0.4)';
                    canvasCtx.stroke();
                }
                
                // HUD Data Labels (Spatial UI)
                canvasCtx.textAlign = 'center';
                const drawHUD = (text, x, y, isAlert) => {
                    canvasCtx.save();
                    canvasCtx.translate(x, y);
                    canvasCtx.scale(-1, 1);
                    canvasCtx.fillStyle = 'rgba(0,0,0,0.6)';
                    canvasCtx.beginPath();
                    canvasCtx.roundRect(-24, -14, 48, 20, 6);
                    canvasCtx.fill();
                    canvasCtx.fillStyle = isAlert ? '#f97316' : '#22c55e';
                    canvasCtx.font = 'bold 10px JetBrains Mono';
                    canvasCtx.fillText(text, 0, 0);
                    canvasCtx.restore();
                };

                if (shoulderVisible) drawHUD("S:" + Math.abs(smoothShoulderAngle).toFixed(0) + "°", leftS.x * W + 20, leftS.y * H - 15, alertStates.shoulder);
                if (faceVisible) {
                    const rotDir = smoothFaceRotation > 0 ? "R:" : "L:";
                    drawHUD(rotDir + Math.abs(smoothFaceRotation).toFixed(2), faceCenterX, faceCenterY - 30, alertStates.rotation);
                    if (baselineHeadRatio > 0 && fwdExtra > 0) drawHUD("F:+" + fwdExtra + "%", nose.x * W, nose.y * H + 30, alertStates.forward);
                }
            }
            
            if (results.faceLandmarks) {
                const face = results.faceLandmarks;
                const upperLip = face[13], lowerLip = face[14];
                const forehead = face[10], chin = face[152];
                
                const lipSep = Math.abs(lowerLip.y - upperLip.y);
                const faceHeight = Math.abs(chin.y - forehead.y);
                lastLipDist = lipSep / faceHeight;
                
                const isMouthInFrame = upperLip.x >= 0 && upperLip.x <= 1 && upperLip.y >= 0 && upperLip.y <= 1 &&
                                       lowerLip.x >= 0 && lowerLip.x <= 1 && lowerLip.y >= 0 && lowerLip.y <= 1;
                
                const isMouthVisible = isMouthInFrame && poseMouthUnoccluded;
                
                if (baselineLipDist > 0 && isMouthVisible) {
                    smoothLipDist = (lastLipDist * EMA_ALPHA) + (smoothLipDist * (1 - EMA_ALPHA));
                    const lipChange = smoothLipDist / baselineLipDist;
                    const mouthOpen = lipChange > 1.12;
                    
                    if (mouthOpen) mouthOpenFrames++;
                    else mouthOpenFrames = 0;
                    
                    const sustained = mouthOpenFrames > 150;
                    const seconds = Math.floor(mouthOpenFrames / 30);
                    alertStates.mouth = sustained;
                    
                    if (sustained) updateMetric('m-jaw', "OPEN " + seconds + "s", true);
                    else if (mouthOpen) updateMetric('m-jaw', "monitoring...", false);
                    else updateMetric('m-jaw', "CLOSED", false);
                } else if (!isMouthVisible) {
                    mouthOpenFrames = 0;
                    alertStates.mouth = false;
                    updateMetric('m-jaw', "BLOCKED", false);
                } else {
                    // Mouth is visible, but not calibrated yet
                    mouthOpenFrames = 0;
                    updateMetric('m-jaw', "UNCALIBRATED", false);
                }
                
                canvasCtx.fillStyle = '#f97316';
                [face[13], face[14]].forEach(p => {
                    canvasCtx.beginPath();
                    canvasCtx.arc(p.x * canvasElement.width, p.y * canvasElement.height, 3, 0, 2 * Math.PI);
                    canvasCtx.fill();
                });
            } else {
                mouthOpenFrames = 0;
                alertStates.mouth = false;
                updateMetric('m-jaw', "NO FACE", false);
            }

            canvasCtx.restore();

            // --- Sample at 1Hz ---
            const now = Date.now();
            if (chartWindowMin > 0 && now - lastSampleTime >= 1000) {
                lastSampleTime = now;
                currentScore = computeScore();
                scoreHistory.push({
                    t: now, score: currentScore,
                    shoulder: smoothShoulderAngle,
                    rotation: smoothFaceRotation,
                    forwardAlert: alertStates.forward,
                    mouthAlert: alertStates.mouth
                });
                
                const cutoff = now - chartWindowMin * 60 * 1000;
                while (scoreHistory.length > 0 && scoreHistory[0].t < cutoff) scoreHistory.shift();
                
                const el = document.getElementById('current-score');
                el.innerText = currentScore;
                el.style.color = currentScore >= 70 ? '#22c55e' : currentScore >= 40 ? '#f97316' : '#ef4444';
                if (currentScore < 40) playAlertSound();
                drawChart();
            }
        }

        // --- Chart ---
        const chartCanvas = document.getElementById('chart_canvas');
        const chartCtx = chartCanvas.getContext('2d');

        function setChartWindow(min) {
            if (chartWindowMin === min) return;
            chartWindowMin = min;
            document.querySelectorAll('.time-btn').forEach(b => b.classList.remove('active'));
            event.target.classList.add('active');
            
            // Restart assessment
            scoreHistory.length = 0;
            consecutiveAlert = { shoulder: 0, rotation: 0, mouth: 0 };
            document.getElementById('current-score').innerText = min === 0 ? '--' : '100';
            document.getElementById('current-score').style.color = '#22c55e';
            
            drawChart();
        }

        function analyzeSegment(data) {
            if (!data.length) return null;
            let sumShoulder = 0, sumRotation = 0, sumScore = 0;
            let fwdCount = 0, mouthCount = 0;
            
            for (let i = 0; i < data.length; i++) {
                const d = data[i];
                sumShoulder += Math.abs(d.shoulder);
                sumRotation += Math.abs(d.rotation);
                sumScore += d.score;
                if (d.forwardAlert) fwdCount++;
                if (d.mouthAlert) mouthCount++;
            }
            
            const len = data.length;
            return { 
                avgShoulder: sumShoulder / len, 
                avgRotation: sumRotation / len, 
                fwdPct: Math.round((fwdCount / len) * 100), 
                mouthPct: Math.round((mouthCount / len) * 100), 
                avgScore: Math.round(sumScore / len) 
            };
        }

        function drawChart() {
            const dpr = window.devicePixelRatio || 1;
            const rect = chartCanvas.getBoundingClientRect();
            chartCanvas.width = rect.width * dpr;
            chartCanvas.height = rect.height * dpr;
            chartCtx.scale(dpr, dpr);
            const W = rect.width, H = rect.height;
            const chartTop = 0, chartH = H - 28; // reserve bottom for segment labels

            chartCtx.clearRect(0, 0, W, H);

            if (chartWindowMin === 0) {
                chartCtx.fillStyle = '#333';
                chartCtx.font = '10px JetBrains Mono';
                chartCtx.fillText('Assessment OFF', W / 2 - 40, H / 2);
                return;
            }

            const now = Date.now();
            const windowMs = chartWindowMin * 60 * 1000;
            const windowStart = now - windowMs;
            const data = scoreHistory.filter(d => d.t >= windowStart);

            if (data.length < 2) {
                chartCtx.fillStyle = '#333';
                chartCtx.font = '10px JetBrains Mono';
                chartCtx.fillText('Collecting data...', W / 2 - 45, H / 2);
                return;
            }

            // Grid
            chartCtx.strokeStyle = '#1a1a1a';
            chartCtx.lineWidth = 1;
            for (let y = 0; y <= 100; y += 25) {
                const py = chartTop + chartH - (y / 100) * chartH;
                chartCtx.beginPath();
                chartCtx.moveTo(0, py);
                chartCtx.lineTo(W, py);
                chartCtx.stroke();
            }

            // 70-line
            chartCtx.strokeStyle = '#333';
            chartCtx.setLineDash([3, 3]);
            const threshY = chartTop + chartH - (70 / 100) * chartH;
            chartCtx.beginPath();
            chartCtx.moveTo(0, threshY);
            chartCtx.lineTo(W, threshY);
            chartCtx.stroke();
            chartCtx.setLineDash([]);

            // Alert zones
            for (let i = 1; i < data.length; i++) {
                if (data[i].score < 70) {
                    const x = ((data[i].t - windowStart) / windowMs) * W;
                    const prevX = ((data[i - 1].t - windowStart) / windowMs) * W;
                    chartCtx.fillStyle = 'rgba(249, 115, 22, 0.06)';
                    chartCtx.fillRect(prevX, chartTop, x - prevX, chartH);
                }
            }

            // Score line
            chartCtx.beginPath();
            for (let i = 0; i < data.length; i++) {
                const x = ((data[i].t - windowStart) / windowMs) * W;
                const y = chartTop + chartH - (data[i].score / 100) * chartH;
                if (i === 0) chartCtx.moveTo(x, y);
                else chartCtx.lineTo(x, y);
            }
            chartCtx.strokeStyle = '#22c55e';
            chartCtx.lineWidth = 1.5;
            chartCtx.stroke();

            // Gradient fill
            const grad = chartCtx.createLinearGradient(0, chartTop, 0, chartTop + chartH);
            grad.addColorStop(0, 'rgba(34, 197, 94, 0.12)');
            grad.addColorStop(1, 'rgba(34, 197, 94, 0)');
            chartCtx.lineTo(((data[data.length - 1].t - windowStart) / windowMs) * W, chartTop + chartH);
            chartCtx.lineTo(((data[0].t - windowStart) / windowMs) * W, chartTop + chartH);
            chartCtx.closePath();
            chartCtx.fillStyle = grad;
            chartCtx.fill();

            // --- 1/5 Segment Analysis ---
            const segments = [];
            for (let i = 0; i < 5; i++) {
                const segStart = windowStart + (windowMs * i) / 5;
                const segEnd = windowStart + (windowMs * (i + 1)) / 5;
                segments.push(data.filter(d => d.t >= segStart && d.t < segEnd));
            }

            // Draw vertical dividers
            for (let i = 1; i <= 4; i++) {
                const x = (i / 5) * W;
                chartCtx.strokeStyle = '#2a2a2a';
                chartCtx.setLineDash([2, 2]);
                chartCtx.beginPath();
                chartCtx.moveTo(x, chartTop);
                chartCtx.lineTo(x, chartTop + chartH);
                chartCtx.stroke();
                chartCtx.setLineDash([]);
            }

            // Draw segment labels at bottom
            chartCtx.font = '6.5px JetBrains Mono';
            for (let i = 0; i < 5; i++) {
                const seg = analyzeSegment(segments[i]);
                if (!seg || segments[i].length < 2) continue;
                const xStart = (i / 5) * W + 2;
                const y = chartTop + chartH + 10;
                const color = seg.avgScore >= 70 ? '#22c55e' : seg.avgScore >= 40 ? '#f97316' : '#ef4444';
                chartCtx.fillStyle = '#444';
                chartCtx.fillText('S' + seg.avgShoulder.toFixed(0) + '° R' + seg.avgRotation.toFixed(2), xStart, y);
                chartCtx.fillStyle = color;
                chartCtx.fillText('F' + seg.fwdPct + '% M' + seg.mouthPct + '% ⌀' + seg.avgScore, xStart, y + 10);
            }
        }

        function updateMetric(id, val, isAlert, pct) {
            if (!domCache[id]) {
                const el = document.getElementById(id);
                if (!el) return;
                domCache[id] = {
                    el,
                    valueEl: el.querySelector('.value'),
                    gaugeEl: el.querySelector('.gauge-fill'),
                    lastVal: null,
                    lastAlert: null,
                    lastPct: null
                };
            }
            
            const cache = domCache[id];
            
            if (cache.lastVal !== val) {
                cache.valueEl.innerText = val;
                cache.lastVal = val;
            }
            
            if (cache.lastAlert !== isAlert) {
                if (isAlert) {
                    cache.el.classList.add('alert');
                    cache.valueEl.style.color = '#f97316';
                } else {
                    cache.el.classList.remove('alert');
                    cache.valueEl.style.color = '#22c55e';
                }
                cache.lastAlert = isAlert;
            }
            
            if (cache.gaugeEl && pct !== undefined) {
                const newPct = Math.min(100, Math.max(0, pct)) + '%';
                if (cache.lastPct !== newPct) {
                    cache.gaugeEl.style.width = newPct;
                    cache.lastPct = newPct;
                }
            }
            
            const hasAnyAlert = alertStates.shoulder || alertStates.rotation || alertStates.forward || alertStates.mouth;
            if (document.body.classList.contains('alert-active') !== hasAnyAlert) {
                document.body.classList.toggle('alert-active', hasAnyAlert);
            }
        }

        function calibrate() {
            baselineLipDist = lastLipDist;
            smoothLipDist = lastLipDist;
            baselineHeadRatio = lastHeadRatio;
            smoothHeadRatio = lastHeadRatio;
            mouthOpenFrames = 0;
            consecutiveAlert = { shoulder: 0, rotation: 0, forward: 0, mouth: 0 };
            scoreHistory.length = 0;
            lastSampleTime = Date.now();
            
            if (chartWindowMin > 0) {
                document.getElementById('current-score').innerText = '100';
                document.getElementById('current-score').style.color = '#22c55e';
            }
            const btn = document.querySelector('.btn');
            const sidebar = document.getElementById('sidebar');
            sidebar.style.background = 'rgba(34, 197, 94, 0.1)';
            btn.innerText = "CALIBRATED ✓";
            btn.style.color = 'var(--neon-green)';
            btn.style.borderColor = 'var(--neon-green)';
            setTimeout(() => { 
                sidebar.style.background = '';
                btn.innerText = "Calibration (C)"; 
                btn.style.color = '';
                btn.style.borderColor = '';
            }, 800);
        }

        const holistic = new Holistic({ locateFile: (file) => `https://cdn.jsdelivr.net/npm/@mediapipe/holistic/${file}` });
        holistic.setOptions({
            modelComplexity: 0,
            minDetectionConfidence: 0.5,
            minTrackingConfidence: 0.5,
            refineFaceLandmarks: false
        });
        holistic.onResults(onResults);

        const camera = new Camera(videoElement, {
            onFrame: async () => { await holistic.send({image: videoElement}); }
        });
        camera.start();
        
        document.addEventListener('keydown', (e) => {
            if (e.key.toLowerCase() === 'c') calibrate();
        });
        
        // Initial paint for OFF state
        setTimeout(drawChart, 100);
    </script>
</body>
</html>
